# this file uses prebuilt image in dockerhub
services:
  jekyll:
    image: amirpourmand/al-folio:v0.14.6
    build:
      context: .
      args:
        GROUPID: 20
        GROUPNAME: staff
        USERID: 501
        USERNAME: markgibbons
    ports:
      - 8080:8080
      - 35729:35729
    volumes:
      - .:/srv/jekyll
    environment:
      - JEKYLL_ENV=development
